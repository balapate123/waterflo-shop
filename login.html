<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a237e">
  <title>Waterflo - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1557 0%, #1a237e 50%, #3949ab 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo .logo-text {
      font-size: 2rem;
      font-weight: 800;
      color: white;
    }
    .auth-logo .logo-text span { color: #f9a825; }
    .auth-logo .logo-sub {
      color: rgba(255,255,255,.7);
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
    }
    .auth-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      color: #546e7a;
      background: #f5f5f5;
      border: none;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: white;
      color: #1a237e;
      border-bottom: 3px solid #1a237e;
    }

    .auth-form-wrap {
      padding: 24px;
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-field {
      margin-bottom: 16px;
    }
    .auth-field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #546e7a;
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
      background: #f0f2f5;
      font-family: inherit;
    }
    .auth-field input:focus {
      border-color: #1a237e;
      background: white;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .auth-btn-login {
      background: #1a237e;
      color: white;
    }
    .auth-btn-login:hover { background: #0d1557; }
    .auth-btn-register {
      background: #c62828;
      color: white;
    }
    .auth-btn-register:hover { background: #b71c1c; }
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success.show { display: block; }

    .auth-footer {
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,.5);
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-logo">
    <div class="logo-text">Water<span>flo</span>&reg;</div>
    <div class="logo-sub">Distributor Order Portal</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Login</button>
      <button class="auth-tab" id="tabRegister">Register</button>
    </div>

    <div class="auth-form-wrap">
      <!-- LOGIN FORM -->
      <form class="auth-form active" id="loginForm">
        <div class="auth-error" id="loginError"></div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn auth-btn-login" id="loginBtn">Login</button>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form" id="registerForm">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess"></div>
        <div class="auth-field">
          <label>Company / Firm Name *</label>
          <input type="text" name="company_name" placeholder="Your company name" required>
        </div>
        <div class="auth-field">
          <label>Contact Person Name *</label>
          <input type="text" name="contact_name" placeholder="Full name" required>
        </div>
        <div class="auth-field">
          <label>Phone Number *</label>
          <input type="tel" name="phone" placeholder="e.g. 9876543210" required>
        </div>
        <div class="auth-field">
          <label>Email *</label>
          <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password * (min 8 characters)</label>
          <input type="password" name="password" placeholder="Create a password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label>Address</label>
          <input type="text" name="address" placeholder="Business address (optional)">
        </div>
        <button type="submit" class="auth-btn auth-btn-register" id="registerBtn">Register</button>
      </form>
    </div>
  </div>

  <div class="auth-footer">
    <p>www.waterflo.in</p>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/index.html';
    });

    // Bind event listeners (CSP blocks inline handlers)
    document.getElementById('tabLogin').addEventListener('click', () => showTab('login'));
    document.getElementById('tabRegister').addEventListener('click', () => showTab('register'));
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('registerForm').addEventListener('submit', handleRegister);

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const data = Object.fromEntries(new FormData(e.target));

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (!res.ok) {
          errEl.textContent = json.error || 'Login failed';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Login';
          return;
        }

        window.location.href = '/index.html';
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      errEl.classList.remove('show');
      sucEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Registering...';

      const data = Object.fromEntries(new FormData(e.target));

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (!res.ok) {
          errEl.textContent = json.error || 'Registration failed';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Register';
          return;
        }

        sucEl.textContent = json.message || 'Registration successful! Please wait for admin approval.';
        sucEl.classList.add('show');
        e.target.reset();
        btn.disabled = false;
        btn.textContent = 'Register';
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Register';
      }
    }
  </script>
</body>
</html>
