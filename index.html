<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a237e">
  <title>Waterflo - Distributor Order Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="landing-page">

  <!-- HEADER -->
  <header class="header">
    <div class="logo-wrap">
      <div>
        <div class="logo-text">Water<span>flo</span>&reg;</div>
        <span class="logo-sub">Distributor Order Portal</span>
      </div>
    </div>
    <div class="header-actions">
      <span class="user-info" id="userInfo"></span>
      <button class="cart-btn" id="myOrdersBtn" onclick="toggleMyOrders()" title="My Orders">&#x1F4CB; Orders</button>
      <a href="/admin.html" class="cart-btn" id="adminLink" style="display:none;text-decoration:none;color:white" title="Admin Dashboard">&#x2699; Admin</a>
      <button class="cart-btn" id="logoutBtn" onclick="handleLogout()" title="Logout">&#x23FB; Logout</button>
    </div>
  </header>

  <!-- HERO -->
  <div class="landing-hero" id="landingHero">
    <h1>Waterflo Pipes &amp; Fittings</h1>
    <p>Select a brand to browse products and place orders</p>
  </div>

  <!-- BRAND GRID -->
  <main class="brand-grid" id="brandGrid">
    <!-- Rendered by JS -->
  </main>

  <!-- MY ORDERS PANEL -->
  <div id="myOrdersPanel" style="display:none">
    <div class="my-orders-container">
      <div class="my-orders-header">
        <h2>My Orders</h2>
        <button onclick="toggleMyOrders()" class="my-orders-close">&times;</button>
      </div>
      <div id="myOrdersList" class="my-orders-list">
        <p style="text-align:center;padding:32px;color:#888">Loading orders...</p>
      </div>
    </div>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div id="orderDetailModal" class="order-detail-overlay" style="display:none" onclick="if(event.target===this)closeOrderDetail()">
    <div class="order-detail-modal">
      <div class="order-detail-header">
        <h3 id="orderDetailTitle">Order Details</h3>
        <button onclick="closeOrderDetail()" class="my-orders-close">&times;</button>
      </div>
      <div id="orderDetailBody"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="landing-footer">
    <p>www.waterflo.in</p>
  </footer>

  <script src="js/brand-config.js"></script>
  <script>
    // Load user info and filter brands by access
    async function initLanding() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) { window.location.href = '/login.html'; return; }
        const data = await res.json();
        const user = data.user;
        document.getElementById('userInfo').textContent = user.company_name || user.contact_name;
        if (user.role === 'admin') document.getElementById('adminLink').style.display = '';
        if (user.role === 'salesman' && data.linked_dealers) {
          setTimeout(function() { renderDealerLanding(data.linked_dealers); }, 0);
        }

        // Fetch brands user has access to
        const bRes = await fetch('/api/brands');
        if (bRes.ok) {
          const { brands } = await bRes.json();
          renderBrandGrid(brands);
        } else {
          renderBrandGrid(BRANDS);
        }
      } catch (e) {
        // Fallback: render all brands (works when opened without server)
        renderBrandGrid(BRANDS);
      }
    }

    function renderBrandGrid(brands) {
      const grid = document.getElementById('brandGrid');
      // Match brand metadata from BRANDS config
      grid.innerHTML = brands.map(b => {
        const cfg = getBrandById(b.id) || b;
        return `
        <a href="brand.html?brand=${b.id}" class="brand-card" style="--brand-color: ${cfg.color || b.color}">
          <div class="brand-card-icon" style="background: ${cfg.heroGradient || ''}">${cfg.icon || b.short_name || ''}</div>
          <div class="brand-card-body">
            <div class="brand-card-name">${cfg.name || b.name}</div>
            <div class="brand-card-tagline">${cfg.tagline || b.tagline || ''}</div>
            <div class="brand-card-date">w.e.f. ${cfg.priceDate || b.price_date || ''}</div>
          </div>
          <div class="brand-card-arrow">&rarr;</div>
        </a>`;
      }).join('');
    }

    function renderDealerLanding(dealers) {
      var lh = document.getElementById('landingHero');
      var currentDealer = localStorage.getItem('wf_salesman_dealer');
      var html = '<div style="margin:16px auto;max-width:400px;background:rgba(255,255,255,0.1);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.2)">';
      html += '<p style="margin-bottom:8px;font-weight:600">👤 Placing order on behalf of:</p>';
      html += '<select id="landingDealerSelect" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;color:#333;font-size:1rem" onchange="localStorage.setItem(\'wf_salesman_dealer\', this.value);">';
      if (!currentDealer) html += '<option value="">-- Select Dealer --</option>';
      dealers.forEach(function(d) {
        html += '<option value="' + d.id + '"' + (currentDealer == d.id ? ' selected' : '') + '>' + d.company_name + '</option>';
      });
      html += '</select></div>';
      lh.insertAdjacentHTML('beforeend', html);
    }

    async function handleLogout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }

    var myOrdersOpen = false;

    async function toggleMyOrders() {
      var panel = document.getElementById('myOrdersPanel');
      myOrdersOpen = !myOrdersOpen;
      panel.style.display = myOrdersOpen ? '' : 'none';
      if (myOrdersOpen) loadMyOrders();
    }

    async function loadMyOrders() {
      var list = document.getElementById('myOrdersList');
      list.innerHTML = '<p style="text-align:center;padding:32px;color:#888">Loading orders...</p>';
      try {
        var res = await fetch('/api/orders');
        if (!res.ok) throw new Error('Failed to load');
        var data = await res.json();
        var orders = data.orders || [];
        if (!orders.length) {
          list.innerHTML = '<p style="text-align:center;padding:32px;color:#888">No orders placed yet.</p>';
          return;
        }
        list.innerHTML = orders.map(function(o) {
          var date = new Date(o.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
          var statusClass = 'status-' + (o.status || 'pending');
          var net = o.net_amount != null ? o.net_amount : o.total_amount;
          return '<div class="my-order-card" onclick="viewOrderDetail(' + o.id + ')">' +
            '<div class="my-order-top">' +
              '<span class="my-order-no">' + escHtml(o.order_no) + '</span>' +
              '<span class="my-order-status ' + statusClass + '">' + escHtml(o.status || 'pending') + '</span>' +
            '</div>' +
            '<div class="my-order-info">' +
              '<span>' + escHtml(o.brand_name || o.brand_short_name || o.brand_id) + '</span>' +
              '<span>' + date + '</span>' +
            '</div>' +
            '<div class="my-order-bottom">' +
              (o.discount_percent > 0 ? '<span class="my-order-discount">Disc: ' + o.discount_percent + '%</span>' : '<span></span>') +
              '<span class="my-order-amount">&#x20B9; ' + Number(net).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}) + '</span>' +
            '</div>' +
          '</div>';
        }).join('');
      } catch (e) {
        list.innerHTML = '<p style="text-align:center;padding:32px;color:#c62828">Error loading orders. Please try again.</p>';
      }
    }

    async function viewOrderDetail(orderId) {
      var modal = document.getElementById('orderDetailModal');
      var body = document.getElementById('orderDetailBody');
      modal.style.display = '';
      body.innerHTML = '<p style="text-align:center;padding:24px;color:#888">Loading...</p>';
      try {
        var res = await fetch('/api/orders/' + orderId);
        if (!res.ok) throw new Error('Failed');
        var data = await res.json();
        var o = data.order;
        var items = data.items || [];
        document.getElementById('orderDetailTitle').textContent = o.order_no;
        var date = new Date(o.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        var net = o.net_amount != null ? o.net_amount : o.total_amount;
        var html = '<div class="od-summary">' +
          '<div class="od-row"><span>Brand</span><span>' + escHtml(o.brand_name || o.brand_id) + '</span></div>' +
          '<div class="od-row"><span>Date</span><span>' + date + '</span></div>' +
          '<div class="od-row"><span>Status</span><span class="my-order-status status-' + (o.status||'pending') + '">' + escHtml(o.status||'pending') + '</span></div>' +
          '<div class="od-row"><span>Total</span><span>&#x20B9; ' + Number(o.total_amount).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span></div>' +
          (o.discount_percent > 0 ? '<div class="od-row"><span>Discount</span><span>' + o.discount_percent + '%</span></div>' : '') +
          '<div class="od-row od-net"><span>Net Amount</span><span>&#x20B9; ' + Number(net).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span></div>' +
          (o.notes ? '<div class="od-row"><span>Notes</span><span>' + escHtml(o.notes) + '</span></div>' : '') +
        '</div>';
        html += '<table class="od-table"><thead><tr><th>Product</th><th>Size</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead><tbody>';
        items.forEach(function(it) {
          var amt = (it.rate_per_unit || 0) * (it.qty || 0);
          html += '<tr><td>' + escHtml(it.name) + '<br><small style="color:#888">' + escHtml(it.code) + '</small></td>' +
            '<td>' + escHtml(it.size) + '</td>' +
            '<td>' + it.qty + ' ' + escHtml(it.unit_label || it.unit_type || '') + '</td>' +
            '<td>&#x20B9;' + Number(it.rate_per_unit).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</td>' +
            '<td>&#x20B9;' + Number(amt).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</td></tr>';
        });
        html += '</tbody></table>';
        body.innerHTML = html;
      } catch (e) {
        body.innerHTML = '<p style="text-align:center;padding:24px;color:#c62828">Error loading order details.</p>';
      }
    }

    function closeOrderDetail() {
      document.getElementById('orderDetailModal').style.display = 'none';
    }

    function escHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', initLanding);
  </script>
</body>
</html>
